# IDA-MCP 配置文件
# ==================
# 支持 stdio 和 HTTP 两种连接方式

# ==================
# 传输方式开关
# ==================
enable_stdio = false       # 是否启用 stdio 模式（协调器，供 MCP 客户端通过子进程连接）
enable_http = true        # 是否启用 HTTP 代理模式（供 MCP 客户端通过 URL 连接）
enable_unsafe = true      # 是否启用 unsafe 工具（py_eval、调试器相关工具）

# ==================
# 协调器配置 (内部组件，固定使用 127.0.0.1)
# ==================
# coordinator_port = 11337    # 兼容旧配置；当前内部 API 已并入 http_port

# ==================
# HTTP 代理配置 (自动启动，客户端只需填写 URL)
# ==================
http_host = "0.0.0.0"  # HTTP 网关监听地址；客户端会自动改用 127.0.0.1 访问
# http_port = 11338        # HTTP 代理端口
# http_path = "/mcp"       # MCP 端点路径

# ==================
# IDA 实例配置 (内部组件，地址固定为 127.0.0.1)
# ==================
# ida_default_port = 10000   # IDA 实例 MCP 端口起始值
ida_path = "D:\safetools\IDAPro-9.3\ida.exe" # IDA 可执行文件路径
# open_in_ida_bundle_dir = "D:\Temp\ida-mcp" # 可选。仅在配置后才会把目标文件复制到该目录下的时间戳目录；若存在匹配的 .i64/.idb 也会一起复制并优先打开数据库。未配置时直接打开原始路径。环境变量 IDA_MCP_BUNDLE_DIR 优先级更高


# ==================
# 通用配置
# ==================
# request_timeout = 30  # 请求超时时间（秒）
# debug = false         # 是否启用调试日志
